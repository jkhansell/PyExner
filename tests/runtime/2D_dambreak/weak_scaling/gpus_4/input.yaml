    type: Reflective
    polygon:
    - [-50.1, -50.1]
    - [-49.9, -50.1]
    - [-49.9, 50.1]
    - [-50.1, 50.1]
    values: [0.0, 0.0, 0.0, 0.0]
    normal: [-1.0, 0.0]
  outlet2:
    type: Reflective
    polygon:
    - [49.9, -50.1]
    - [50.1, -50.1]
    - [50.1, 50.1]
    - [49.9, 50.1]
    values: [0.0, 0.0, 0.0, 0.0]
    normal: [1.0, 0.0]
  outlet3:
    type: Reflective
    polygon:
    - [-50.1, -50.1]
    - [50.1, -50.1]
    - [50.1, -49.9]
    - [-50.1, -49.9]
    values: [0.0, 0.0, 0.0, 0.0]
    normal: [0.0, -1.0]
  outlet4:
    type: Reflective
    polygon:
    - [-50.1, 49.9]
    - [50.1, 49.9]
    - [50.1, 50.1]
    - [-50.1, 50.1]
    values: [0.0, 0.0, 0.0, 0.0]
    normal: [0.0, 1.0]
