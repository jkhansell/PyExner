end_time: 6
out_freq: 0.5
io_freq: 0.5
cfl: 0.5
flux_scheme: Roe Exner
integrator: Forward Euler
parNx: 1
parNy: 1
input_file: analytical_case.nc
output_file: analytical_case_out.nc

erosion:
  grass_factor: MPM
  bulk_porosity: 0.39
  sediments:
    sed1: 
      fraction: 1.0
      diameter: 1.72e-3
      density: 2630
      deposition_flux: 0.01
      erosion_flux: 0.04
  

boundaries:

  inlet:
    type: Transmissive
    polygon:
      - [0, 0]
      - [0.1, 0]
      - [0.1,  1]
      - [0, 1]
    values: [0.0, 0.0, 0.0, 0.0]
    normal: [-1.0, 0.0]

  outlet:
    type: Transmissive
    polygon:
      - [ 6.9, 0]
      - [ 7, 0]
      - [ 7,  1]
      - [ 6.9,  1]
    values: [0.0, 0.0, 0.0, 0.0]
    normal: [1.0, 0.0]

  top:
    type: Reflective
    polygon:
      - [0, 0]
      - [ 7, 0]
      - [ 7, 0.1]
      - [0, 0.1]
    values: [0.0, 0.0, 0.0, 0.0]
    normal: [0.0, -1.0]

  bottom:
    type: Reflective
    polygon:
      - [0,  1]
      - [ 7,  1]
      - [ 7,  0.9]
      - [0,  0.9]
    values: [0.0, 0.0, 0.0, 0.0]
    normal: [0.0, 1.0]
