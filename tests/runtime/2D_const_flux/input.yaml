end_time: 10
out_freq: 1.0
io_freq: 1.0
cfl: 0.5
flux_scheme: Roe Exner
integrator: Forward Euler
parNx: 1
parNy: 1
input_file: analytical_case.nc
output_file: analytical_case_out.nc

erosion:
  grass_factor: 0.005

boundaries:

  inlet_flux:
    type: ConstantInflux
    polygon:
      - [0.00, 0.00]
      - [0.05, 0.00]
      - [0.05, 1.0]
      - [0.00, 1.0]
    values: [1.0, 1.0, 0.0]
    normal: [-1.0, 0.0]

  inlet_bed:
    type: Berthon
    polygon:
      - [0.00, 0.00]
      - [0.05, 0.00]
      - [0.05, 1.0]
      - [0.00, 1.0]
    values: [1.0, 0.005, 0.005, 0.005, 1, 0.025]
    normal: [-1.0, 0.0]

  #outlet_flux:
  #  type: ConstantOutflux
  #  polygon:
  #    - [6.95, 0.00]
  #    - [7.05, 0.00]
  #    - [7.05, 1.05]
  #    - [6.95, 1.05]
  #  values: [1.0, 1.0, 0.0]
  #  normal: [1.0, 0.0]

  outlet_bed:
    type: NormalFlowDepth # Berthon analytical boundary need to change names
    polygon:
      - [6.95, 0.00]
      - [7.05, 0.00]
      - [7.05, 1.05]
      - [6.95, 1.05]
    values: [1.0, 0.005, 0.005, 0.005, 1, 6.975]
    normal: [1.0, 0.0]

  bottom:
    type: Reflective
    polygon:
      - [0.00, -0.05]
      - [7.05, -0.05]
      - [7.05, 0.05]
      - [0.00, 0.05]
    values: [0, 0, 0, 0]
    normal: [0.0, -1.0]

  top:
    type: Reflective
    polygon:
      - [0.00,  1.05]
      - [7.05,  1.05]
      - [7.05,  0.95]
      - [0.00,  0.95]
    values: [0, 0, 0, 0]
    normal: [0.0, 1.0]