end_time: 20.0
out_freq: 0.01
cfl: 0.5
flux_scheme: Roe Exner
integrator: Forward Euler
parNx: 1
parNy: 1
input_file: erodible_channel.nc
output_file: erodible_channel_out.nc

erosion: 
  grass_factor: MPM
  bulk_porosity: 0.44
  sediments:
    sed1: 
      fraction: 1.0
      diameter: 1.7e-3
      density: 2650
      deposition_flux: 0.01
      erosion_flux: 0.01

boundaries:
  # ==========================================
  # LEFT TANK BACK WALL
  # ==========================================
  left:
    type: Reflective
    polygon:
      - [-12.090, -4.600]
      - [-12.080, -4.600]
      - [-12.080,  4.600]
      - [-12.090,  4.600]
    values: [NaN, 0.0, NaN, NaN]
    normal: [-1.0, 0.0]

  # ==========================================
  # BOTTOM WALLS (y < 0)
  # ==========================================
  down_1: # Left Tank Bottom Wall
    type: Reflective
    polygon:
      - [-12.090, -4.600]
      - [-10.330, -4.600]
      - [-10.330, -4.590]
      - [-12.090, -4.590]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, -1.0]

  down_2: # Left Tank Front Face (Vertical Step In)
    type: Reflective
    polygon:
      - [-10.340, -4.600]
      - [-10.330, -4.600]
      - [-10.330, -1.800]
      - [-10.340, -1.800]
    values: [NaN, 0.0, NaN, NaN]
    normal: [1.0, 0.0]

  down_3: # Main Channel Bottom Wall
    type: Reflective
    polygon:
      - [-10.330, -1.800]
      - [-0.500,  -1.800]
      - [-0.500,  -1.790]
      - [-10.330, -1.790]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, -1.0]

  down_4: # Contraction Inlet Face (Vertical Step In)
    type: Reflective
    polygon:
      - [-0.510, -1.800]
      - [-0.500, -1.800]
      - [-0.500, -0.500]
      - [-0.510, -0.500]
    values: [NaN, 0.0, NaN, NaN]
    normal: [1.0, 0.0]

  down_5: # Contraction Bottom Wall
    type: Reflective
    polygon:
      - [-0.500, -0.500]
      - [ 0.500, -0.500]
      - [ 0.500, -0.490]
      - [-0.500, -0.490]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, -1.0]

  down_6: # Contraction Outlet Face (Vertical Step Out)
    type: Reflective
    polygon:
      - [ 0.500, -1.800]
      - [ 0.510, -1.800]
      - [ 0.510, -0.500]
      - [ 0.500, -0.500]
    values: [NaN, 0.0, NaN, NaN]
    normal: [-1.0, 0.0]

  down_7: # Right Channel Bottom Wall
    type: Reflective
    polygon:
      - [ 0.500, -1.800]
      - [15.500, -1.800]
      - [15.500, -1.790]
      - [ 0.500, -1.790]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, -1.0]

  # ==========================================
  # TOP WALLS (y > 0)
  # ==========================================
  up_1: # Right Channel Top Wall
    type: Reflective
    polygon:
      - [ 0.500,  1.790]
      - [15.500,  1.790]
      - [15.500,  1.800]
      - [ 0.500,  1.800]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, 1.0]

  up_2: # Contraction Outlet Face (Vertical Step Out)
    type: Reflective
    polygon:
      - [ 0.500,  0.500]
      - [ 0.510,  0.500]
      - [ 0.510,  1.800]
      - [ 0.500,  1.800]
    values: [NaN, 0.0, NaN, NaN]
    normal: [-1.0, 0.0]

  up_3: # Contraction Top Wall
    type: Reflective
    polygon:
      - [-0.500,  0.490]
      - [ 0.500,  0.490]
      - [ 0.500,  0.500]
      - [-0.500,  0.500]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, 1.0]

  up_4: # Contraction Inlet Face (Vertical Step In)
    type: Reflective
    polygon:
      - [-0.510,  0.500]
      - [-0.500,  0.500]
      - [-0.500,  1.800]
      - [-0.510,  1.800]
    values: [NaN, 0.0, NaN, NaN]
    normal: [1.0, 0.0]

  up_5: # Main Channel Top Wall
    type: Reflective
    polygon:
      - [-10.330,  1.790]
      - [-0.500,   1.790]
      - [-0.500,   1.800]
      - [-10.330,  1.800]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, 1.0]

  up_6: # Left Tank Front Face (Vertical Step In)
    type: Reflective
    polygon:
      - [-10.340,  1.800]
      - [-10.330,  1.800]
      - [-10.330,  4.600]
      - [-10.340,  4.600]
    values: [NaN, 0.0, NaN, NaN]
    normal: [1.0, 0.0]

  up_7: # Left Tank Top Wall
    type: Reflective
    polygon:
      - [-12.090,  4.590]
      - [-10.330,  4.590]
      - [-10.330,  4.600]
      - [-12.090,  4.600]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, 1.0]

  # ==========================================
  # OUTLET
  # ==========================================
  right:
    type: Transmissive
    polygon:
      - [15.490, -1.800]
      - [15.500, -1.800]
      - [15.500,  1.800]
      - [15.490,  1.800]
    values: [NaN, NaN, NaN, NaN]
    normal: [1.0, 0.0]