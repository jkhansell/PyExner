end_time: 20.0
out_freq: 0.25
cfl: 0.5
flux_scheme: Roe Exner
integrator: Forward Euler
parNx: 1
parNy: 1
input_file: erodible_channel.nc
output_file: erodible_channel_out.nc

erosion: 
  grass_factor: MPM
  bulk_porosity: 0.42
  sediments:
    sed1: 
      fraction: 1.0
      diameter: 1.61e-3
      density: 2630
      deposition_flux: 0.01
      erosion_flux: 0.01

boundaries:
  # ==========================================
  # HORIZONTAL WALLS (Processed First)
  # ==========================================
  down_1: # Left Tank Bottom
    type: Reflective
    polygon:
      - [-12.090, -4.610]
      - [-10.330, -4.610]
      - [-10.330, -4.600]
      - [-12.090, -4.600]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, -1.0]

  down_3: # Main Channel Bottom
    type: Reflective
    polygon:
      - [-10.330, -1.810]
      - [-0.500,  -1.810]
      - [-0.500,  -1.800]
      - [-10.330, -1.800]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, -1.0]

  down_5: # Contraction Bottom (Restored to full length)
    type: Reflective
    polygon:
      - [-0.500, -0.510]
      - [ 0.500, -0.510]
      - [ 0.500, -0.500]
      - [-0.500, -0.500]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, -1.0]

  down_7: # Right Channel Bottom
    type: Reflective
    polygon:
      - [ 0.500, -1.810]
      - [15.500, -1.810]
      - [15.500, -1.800]
      - [ 0.500, -1.800]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, -1.0]

  up_1: # Right Channel Top
    type: Reflective
    polygon:
      - [ 0.500,  1.800]
      - [15.500,  1.800]
      - [15.500,  1.810]
      - [ 0.500,  1.810]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, 1.0]

  up_3: # Contraction Top (Restored to full length)
    type: Reflective
    polygon:
      - [-0.500, 0.500]
      - [ 0.500, 0.500]
      - [ 0.500, 0.510]
      - [-0.500, 0.510]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, 1.0]

  up_5: # Main Channel Top
    type: Reflective
    polygon:
      - [-10.330, 1.800]
      - [-0.500,  1.800]
      - [-0.500,  1.810]
      - [-10.330, 1.810]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, 1.0]

  up_7: # Left Tank Top
    type: Reflective
    polygon:
      - [-12.090, 4.600]
      - [-10.330, 4.600]
      - [-10.330, 4.610]
      - [-12.090, 4.610]
    values: [NaN, NaN, 0.0, NaN]
    normal: [0.0, 1.0]

  # ==========================================
  # VERTICAL WALLS (Processed Last - Wins all corners)
  # ==========================================
  left: # Left Tank Back Wall
    type: Reflective
    polygon:
      - [-12.100, -4.600]
      - [-12.090, -4.600]
      - [-12.090,  4.600]
      - [-12.100,  4.600]
    values: [NaN, 0.0, NaN, NaN]
    normal: [-1.0, 0.0]

  down_2: # Left Tank Front Face
    type: Reflective
    polygon:
      - [-10.330, -4.600]
      - [-10.320, -4.600]
      - [-10.320, -1.800]
      - [-10.330, -1.800]
    values: [NaN, 0.0, NaN, NaN]
    normal: [1.0, 0.0]

  down_4: # Contraction Inlet Face (Restored to full length)
    type: Reflective
    polygon:
      - [-0.500, -1.800]
      - [-0.490, -1.800]
      - [-0.490, -0.500]
      - [-0.500, -0.500]
    values: [NaN, 0.0, NaN, NaN]
    normal: [1.0, 0.0]

  down_6: # Contraction Outlet Face (Restored to full length)
    type: Reflective
    polygon:
      - [0.490, -1.800]
      - [0.500, -1.800]
      - [0.500, -0.500]
      - [0.490, -0.500]
    values: [NaN, 0.0, NaN, NaN]
    normal: [-1.0, 0.0]

  up_2: # Contraction Outlet Face (Restored to full length)
    type: Reflective
    polygon:
      - [0.490, 0.500]
      - [0.500, 0.500]
      - [0.500, 1.800]
      - [0.490, 1.800]
    values: [NaN, 0.0, NaN, NaN]
    normal: [-1.0, 0.0]

  up_4: # Contraction Inlet Face (Restored to full length)
    type: Reflective
    polygon:
      - [-0.500, 0.500]
      - [-0.490, 0.500]
      - [-0.490, 1.800]
      - [-0.500, 1.800]
    values: [NaN, 0.0, NaN, NaN]
    normal: [1.0, 0.0]

  up_6: # Left Tank Front Face
    type: Reflective
    polygon:
      - [-10.330, 1.800]
      - [-10.320, 1.800]
      - [-10.320, 4.600]
      - [-10.330, 4.600]
    values: [NaN, 0.0, NaN, NaN]
    normal: [1.0, 0.0]

  right: # Transmissive Outlet
    type: Transmissive
    polygon:
      - [15.500, -1.800]
      - [15.510, -1.800]
      - [15.510,  1.800]
      - [15.500,  1.800]
    values: [NaN, NaN, NaN, NaN]
    normal: [1.0, 0.0]
  
  right_bed: # Transmissive Outlet
    type: TransmissiveBed
    polygon:
      - [15.500, -1.800]
      - [15.510, -1.800]
      - [15.510,  1.800]
      - [15.500,  1.800]
    values: [NaN, NaN, NaN, NaN]
    normal: [1.0, 0.0]